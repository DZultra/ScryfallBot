plugins {
    id 'java'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

group = 'net.dzultra'
version = '1.0.0'

repositories {
    mavenCentral()
}

jar {
    manifest {
        attributes(
                'Main-Class': 'net.dzultra.MTGDiscordBot.Main'
        )
    }
}

dependencies {
    implementation("net.dzultra:JavaScryfallAPI:1.0.1")
    implementation('com.discord4j:discord4j-core:3.3.2')
    compileOnly('org.jetbrains:annotations:24.0.1')
}